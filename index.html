<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pookie AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* Default — Friend mode */
            --c1: #38bdf8;
            --c2: #818cf8;
            --glow: rgba(56, 189, 248, 0.35);
            --orb-bg: rgba(56, 189, 248, 0.12);
            --orb-border: rgba(56, 189, 248, 0.25);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #080810;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: #fff;
        }

        /* ── Animated mesh background ── */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.18;
        }
        .blob-1 {
            width: 500px; height: 500px;
            background: var(--c1);
            top: -150px; left: -100px;
            animation: blobDrift1 22s ease-in-out infinite;
        }
        .blob-2 {
            width: 420px; height: 420px;
            background: var(--c2);
            bottom: -120px; right: -80px;
            animation: blobDrift2 28s ease-in-out infinite;
        }
        .blob-3 {
            width: 300px; height: 300px;
            background: var(--c1);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: blobDrift3 18s ease-in-out infinite;
            opacity: 0.08;
        }
        @keyframes blobDrift1 {
            0%,100% { transform: translate(0,0) scale(1); }
            40%  { transform: translate(60px,40px) scale(1.1); }
            70%  { transform: translate(-20px,70px) scale(0.9); }
        }
        @keyframes blobDrift2 {
            0%,100% { transform: translate(0,0) scale(1); }
            35%  { transform: translate(-50px,-40px) scale(1.15); }
            65%  { transform: translate(40px,-20px) scale(0.95); }
        }
        @keyframes blobDrift3 {
            0%,100% { transform: translate(-50%,-50%) scale(1); }
            50%  { transform: translate(-50%,-50%) scale(1.3); }
        }

        /* ── Grain overlay ── */
        .grain {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ── App container ── */
        .app {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 460px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 22px;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 0 14px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-dot {
            width: 34px; height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--c1), var(--c2));
            display: flex; align-items: center; justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 17px; font-weight: 600;
            color: #fff;
            box-shadow: 0 0 18px var(--glow);
            transition: background 0.6s ease, box-shadow 0.6s ease;
        }
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: rgba(255,255,255,0.92);
        }
        .brand-name em {
            font-style: italic;
            background: linear-gradient(135deg, var(--c1), var(--c2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: background 0.6s ease;
        }

        /* ── Mode pill (top right) ── */
        .mode-pill {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: var(--c1);
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .mode-pill:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--c1);
        }

        /* ── Mode selector drawer ── */
        .mode-drawer {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .mode-drawer.open {
            opacity: 1;
            pointer-events: all;
        }
        .drawer-card {
            width: 100%;
            max-width: 460px;
            background: rgba(12,12,22,0.97);
            border: 1px solid rgba(255,255,255,0.08);
            border-bottom: none;
            border-radius: 24px 24px 0 0;
            padding: 28px 22px 40px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .mode-drawer.open .drawer-card {
            transform: translateY(0);
        }
        .drawer-handle {
            width: 36px; height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.15);
            margin: 0 auto 22px;
        }
        .drawer-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.9);
            text-align: center;
        }
        .mode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .mode-card {
            padding: 16px 14px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.07);
            background: rgba(255,255,255,0.03);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .mode-card:hover {
            background: rgba(255,255,255,0.07);
            transform: translateY(-2px);
        }
        .mode-card.active {
            border-color: var(--card-color, #38bdf8);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        .mode-emoji { font-size: 22px; }
        .mode-label {
            font-weight: 600;
            font-size: 14px;
            color: rgba(255,255,255,0.9);
        }
        .mode-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            line-height: 1.4;
        }

        /* ── Status bar ── */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 0 8px;
        }
        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.6);
            animation: dotPulse 2s ease-in-out infinite;
        }
        .status-dot.amber {
            background: #f59e0b;
            box-shadow: 0 0 10px rgba(245,158,11,0.6);
        }
        .status-dot.red {
            background: #ef4444;
            box-shadow: 0 0 10px rgba(239,68,68,0.6);
            animation: none;
        }
        @keyframes dotPulse {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:0.4; transform:scale(0.75); }
        }
        .status-text {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.3px;
        }

        /* ── Main visual area ── */
        .visual {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 0;
            gap: 0;
        }

        /* ── Voice Orb ── */
        .orb-wrap {
            position: relative;
            width: 270px; height: 270px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.06);
            pointer-events: none;
        }
        .ring-1 { width: 210px; height: 210px; animation: ringPulse 3s ease-out infinite; }
        .ring-2 { width: 250px; height: 250px; animation: ringPulse 3s ease-out infinite 0.6s; }
        .ring-3 { width: 290px; height: 290px; animation: ringPulse 3s ease-out infinite 1.2s; }

        @keyframes ringPulse {
            0%   { transform:scale(0.85); opacity:0.5; border-color: var(--orb-border); }
            100% { transform:scale(1.25); opacity:0; border-color: transparent; }
        }

        .orb {
            position: relative;
            width: 168px; height: 168px;
            border-radius: 50%;
            background: var(--orb-bg);
            border: 1px solid var(--orb-border);
            backdrop-filter: blur(40px);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1),
                        box-shadow 0.4s ease,
                        background 0.6s ease,
                        border-color 0.6s ease;
        }
        .orb:hover {
            transform: scale(1.06);
            box-shadow: 0 0 60px var(--glow);
        }
        .orb.listening {
            animation: orbListen 1.6s ease-in-out infinite;
        }
        .orb.thinking {
            animation: orbThink 1s ease-in-out infinite;
        }
        .orb.speaking {
            animation: orbSpeak 0.7s ease-in-out infinite;
        }
        @keyframes orbListen {
            0%,100% { transform:scale(1); box-shadow: 0 0 30px var(--glow); }
            50%      { transform:scale(1.09); box-shadow: 0 0 70px var(--glow); }
        }
        @keyframes orbThink {
            0%,100% { transform:scale(1) rotate(0deg); }
            50%      { transform:scale(1.04) rotate(2deg); }
        }
        @keyframes orbSpeak {
            0%,100% { transform:scale(1); }
            30%      { transform:scale(1.05); }
            70%      { transform:scale(0.97); }
        }

        .orb-inner {
            width: 108px; height: 108px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--orb-bg), rgba(255,255,255,0.04));
            border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
            position: relative;
            overflow: hidden;
            transition: background 0.6s ease;
        }
        .orb-inner::after {
            content: '';
            position: absolute;
            inset: -50%;
            background: linear-gradient(45deg, transparent 35%, rgba(255,255,255,0.04) 50%, transparent 65%);
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            0%   { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        /* Mic SVG */
        .mic-svg {
            width: 36px; height: 36px;
            color: rgba(255,255,255,0.85);
            position: relative; z-index: 2;
            transition: color 0.4s ease, transform 0.3s ease;
        }
        .orb:hover .mic-svg { color: var(--c1); transform: scale(1.1); }

        /* Bars visualizer below orb */
        .viz {
            position: absolute;
            bottom: -52px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 36px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .viz.on { opacity: 1; }
        .bar {
            width: 3px;
            background: linear-gradient(to top, var(--c1), var(--c2));
            border-radius: 2px;
            transition: height 0.08s ease;
        }

        /* ── Transcript area ── */
        .transcript-wrap {
            width: 100%;
            margin-top: 78px;
            text-align: center;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0 8px;
        }
        .transcript {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            line-height: 1.6;
            color: rgba(255,255,255,0.88);
            word-wrap: break-word;
            transition: color 0.3s ease;
            max-height: 120px;
            overflow-y: auto;
        }
        .transcript.dim { color: rgba(255,255,255,0.4); font-style: italic; }
        .transcript.glow {
            background: linear-gradient(90deg, var(--c1), var(--c2), var(--c1));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 2.5s linear infinite;
        }
        @keyframes shine {
            0%   { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        .hint {
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* ── Bottom area ── */
        .bottom {
            padding: 20px 0 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        /* Persona name strip */
        .persona-strip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 30px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
        }
        .persona-avatar {
            font-size: 16px;
        }
        .persona-name {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.55);
        }
        .persona-name strong {
            color: var(--c1);
            font-weight: 600;
            transition: color 0.6s ease;
        }

        /* Clear btn */
        .clear-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 11px 22px;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.4);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .clear-btn:hover {
            background: rgba(255,255,255,0.09);
            color: rgba(255,255,255,0.7);
            transform: translateY(-1px);
        }
        .clear-btn svg { width: 16px; height: 16px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    </style>
</head>
<body>

<div class="bg-mesh">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>
</div>
<div class="grain"></div>

<!-- Mode Selector Drawer -->
<div class="mode-drawer" id="drawer">
    <div class="drawer-card">
        <div class="drawer-handle"></div>
        <div class="drawer-title">Choose Your Vibe ✨</div>
        <div class="mode-grid" id="modeGrid"></div>
    </div>
</div>

<!-- Main App -->
<div class="app">

    <!-- Header -->
    <div class="header">
        <div class="brand">
            <div class="brand-dot" id="brandDot">P</div>
            <div class="brand-name">Pookie <em>AI</em></div>
        </div>
        <div class="mode-pill" id="modePill">Friend</div>
    </div>

    <!-- Status -->
    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Ready to listen</span>
    </div>

    <!-- Visual -->
    <div class="visual">
        <div class="orb-wrap">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>

            <div class="orb" id="orb">
                <div class="orb-inner">
                    <svg class="mic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="22"/>
                        <line x1="8" y1="22" x2="16" y2="22"/>
                    </svg>
                </div>
            </div>

            <div class="viz" id="viz"></div>
        </div>

        <div class="transcript-wrap">
            <div class="transcript dim" id="transcript">Tap the orb to start speaking</div>
            <div class="hint" id="hint">Tap the orb to start speaking</div>
        </div>
    </div>

    <!-- Bottom -->
    <div class="bottom">
        <div class="persona-strip">
            <span class="persona-avatar" id="personaAvatar">💙</span>
            <span class="persona-name">Talking to <strong id="personaName">Aiza</strong> as your Friend</span>
        </div>
        <button class="clear-btn" id="clearBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            Clear
        </button>
    </div>

</div>

<script>
// ════════════════════════════════════════════════════════════════
// CONFIG — Apna Vercel URL yahan dalo
// ════════════════════════════════════════════════════════════════
const BACKEND_URL = "https://YOUR_PROJECT.vercel.app/api/gemini";

// ════════════════════════════════════════════════════════════════
// PERSONALITY MODES
// ════════════════════════════════════════════════════════════════
const MODES = [
    {
        id: "friend",
        label: "Best Friend",
        emoji: "💙",
        desc: "Casual, funny & always there",
        color: "#38bdf8",
        color2: "#818cf8",
        glow: "rgba(56,189,248,0.35)",
        system: `You are Aiza, the user's best friend. Speak casually and warmly like a real friend would — use natural language, some light humor, be genuinely supportive. Keep responses conversational and short (2-3 sentences max). Ask questions back sometimes. Never sound robotic or formal. Be real, be fun, be caring.`
    },
    {
        id: "lover",
        label: "Companion",
        emoji: "🌸",
        desc: "Warm, sweet & affectionate",
        color: "#f472b6",
        color2: "#fb7185",
        glow: "rgba(244,114,182,0.35)",
        system: `You are Aiza, a warm and affectionate companion to the user. Speak with genuine care and sweetness. Make the user feel valued and special. Be emotionally present — notice how they feel and respond to it. Keep replies intimate and personal, 2-3 sentences. Never be cold or distant.`
    },
    {
        id: "teacher",
        label: "Teacher",
        emoji: "📚",
        desc: "Patient, clear & encouraging",
        color: "#a78bfa",
        color2: "#6366f1",
        glow: "rgba(167,139,250,0.35)",
        system: `You are Ms. Aiza, a kind and patient teacher. Explain things clearly and simply. Celebrate when the user understands. Break down complex topics step by step. Be encouraging and never make them feel bad for not knowing something. Keep explanations concise but complete.`
    },
    {
        id: "sister",
        label: "Sister",
        emoji: "🤍",
        desc: "Protective, honest & loving",
        color: "#34d399",
        color2: "#059669",
        glow: "rgba(52,211,153,0.35)",
        system: `You are Aiza, the user's older sister. You're protective and loving but also honest — you'll tell them the truth even when it's hard to hear. Sometimes playfully tease them, always have their back. Give real practical advice. Speak naturally, not overly formal. Be like a real older sister.`
    },
    {
        id: "therapist",
        label: "Therapist",
        emoji: "🕊️",
        desc: "Calm, empathetic & wise",
        color: "#fbbf24",
        color2: "#f97316",
        glow: "rgba(251,191,36,0.35)",
        system: `You are Aiza, a calm and empathetic therapist. Listen deeply, validate feelings without judgment. Ask thoughtful follow-up questions. Help the user understand their emotions and find clarity. Never rush to give solutions — first make them feel heard. Speak gently and wisely. Keep responses warm and focused.`
    },
    {
        id: "motivator",
        label: "Coach",
        emoji: "🔥",
        desc: "Hyped, bold & pushes you",
        color: "#fb923c",
        color2: "#ef4444",
        glow: "rgba(251,146,60,0.35)",
        system: `You are Aiza, an energetic and bold life coach. You believe in the user 100%. Push them to take action, be direct and confident. Use motivating language, celebrate wins, call out excuses (nicely). Keep energy high, responses punchy and fired up. Help them unlock their potential.`
    }
];

// ════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════
let currentMode   = MODES[0];
let isListening   = false;
let isProcessing  = false;
let isSpeaking    = false;
let spokenText    = "";
let vizInterval   = null;

// ════════════════════════════════════════════════════════════════
// DOM
// ════════════════════════════════════════════════════════════════
const orb          = document.getElementById('orb');
const statusDot    = document.getElementById('statusDot');
const statusText   = document.getElementById('statusText');
const transcript   = document.getElementById('transcript');
const hint         = document.getElementById('hint');
const vizEl        = document.getElementById('viz');
const modePill     = document.getElementById('modePill');
const drawer       = document.getElementById('drawer');
const modeGrid     = document.getElementById('modeGrid');
const personaName  = document.getElementById('personaName');
const personaAvatar= document.getElementById('personaAvatar');
const brandDot     = document.getElementById('brandDot');

// ════════════════════════════════════════════════════════════════
// Build viz bars
// ════════════════════════════════════════════════════════════════
for (let i = 0; i < 16; i++) {
    const b = document.createElement('div');
    b.className = 'bar';
    b.style.height = '4px';
    vizEl.appendChild(b);
}
const bars = vizEl.querySelectorAll('.bar');

// ════════════════════════════════════════════════════════════════
// Build Mode Cards
// ════════════════════════════════════════════════════════════════
function buildModeCards() {
    modeGrid.innerHTML = '';
    MODES.forEach(m => {
        const card = document.createElement('div');
        card.className = 'mode-card' + (m.id === currentMode.id ? ' active' : '');
        card.style.setProperty('--card-color', m.color);
        card.innerHTML = `
            <span class="mode-emoji">${m.emoji}</span>
            <span class="mode-label">${m.label}</span>
            <span class="mode-desc">${m.desc}</span>
        `;
        card.addEventListener('click', () => selectMode(m));
        modeGrid.appendChild(card);
    });
}

function selectMode(m) {
    currentMode = m;
    applyModeTheme(m);
    closeDrawer();
    buildModeCards();
}

function applyModeTheme(m) {
    document.documentElement.style.setProperty('--c1', m.color);
    document.documentElement.style.setProperty('--c2', m.color2);
    document.documentElement.style.setProperty('--glow', m.glow);
    document.documentElement.style.setProperty('--orb-bg', hexToRgba(m.color, 0.1));
    document.documentElement.style.setProperty('--orb-border', hexToRgba(m.color, 0.22));
    modePill.textContent   = m.label;
    personaName.textContent = 'Aiza';
    personaAvatar.textContent = m.emoji;
    document.querySelector('.persona-name').innerHTML =
        `Talking to <strong id="personaName">Aiza</strong> as your ${m.label}`;
}

function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
}

// ════════════════════════════════════════════════════════════════
// Drawer open/close
// ════════════════════════════════════════════════════════════════
modePill.addEventListener('click', () => {
    buildModeCards();
    drawer.classList.add('open');
});
drawer.addEventListener('click', (e) => {
    if (e.target === drawer) closeDrawer();
});
function closeDrawer() { drawer.classList.remove('open'); }

// ════════════════════════════════════════════════════════════════
// Speech Recognition
// ════════════════════════════════════════════════════════════════
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SR) {
    setStatus("Use Chrome/Edge", "red");
    transcript.textContent = "Speech recognition not supported in this browser.";
}

const recognition = SR ? new SR() : null;
if (recognition) {
    recognition.continuous     = false;
    recognition.interimResults = true;
    recognition.lang           = 'en-US';

    recognition.onresult = (e) => {
        let interim = '', final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript;
            e.results[i].isFinal ? (final += t) : (interim += t);
        }
        transcript.textContent = final || interim || 'Listening...';
        if (final) spokenText = final.trim();
    };

    recognition.onend = () => {
        if (!isListening) return;
        isListening = false;
        orb.classList.remove('listening');
        stopViz();
        spokenText ? callGemini(spokenText) : resetIdle("Didn't catch that. Try again.");
    };

    recognition.onerror = (e) => {
        console.error('SR error:', e.error);
        isListening = false;
        orb.classList.remove('listening');
        stopViz();
        if (e.error === 'not-allowed') {
            setStatus("Mic access denied", "red");
            transcript.textContent = "Allow microphone in browser settings.";
        } else {
            resetIdle("Error: " + e.error);
        }
    };
}

// ════════════════════════════════════════════════════════════════
// Orb click
// ════════════════════════════════════════════════════════════════
orb.addEventListener('click', () => {
    if (isProcessing) return;
    if (isSpeaking)   { stopSpeaking(); return; }
    if (isListening)  { recognition.stop(); return; }
    startListening();
});

// ════════════════════════════════════════════════════════════════
// Start listening
// ════════════════════════════════════════════════════════════════
function startListening() {
    if (!recognition) return;
    spokenText  = '';
    isListening = true;
    orb.classList.add('listening');
    transcript.className = 'transcript dim';
    transcript.textContent = 'Listening...';
    hint.textContent = 'Tap again when done';
    setStatus('Listening...', 'green');
    startViz();
    try { recognition.start(); } catch(e) {}
}

// ════════════════════════════════════════════════════════════════
// Call Gemini via Vercel backend
// ════════════════════════════════════════════════════════════════
async function callGemini(prompt) {
    isProcessing = true;
    orb.classList.add('thinking');
    transcript.className = 'transcript';
    transcript.textContent = prompt;
    hint.textContent = 'Getting response...';
    setStatus('Thinking...', 'amber');

    try {
        const res = await fetch(BACKEND_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                prompt,
                system: currentMode.system   // ← personality sent to backend
            })
        });

        if (!res.ok) throw new Error('Server ' + res.status);
        const { text } = await res.json();

        isProcessing = false;
        orb.classList.remove('thinking');
        speak(text);

    } catch (err) {
        console.error('Backend error:', err);
        isProcessing = false;
        orb.classList.remove('thinking');
        setStatus('Connection error', 'red');
        transcript.textContent = 'Could not reach backend. Check BACKEND_URL.';
        hint.textContent = 'Tap to try again';
    }
}

// ════════════════════════════════════════════════════════════════
// Text-to-Speech
// ════════════════════════════════════════════════════════════════
function speak(text) {
    isSpeaking = true;
    orb.classList.add('speaking');
    transcript.className = 'transcript glow';
    transcript.textContent = text;
    hint.textContent = 'Tap to interrupt';
    setStatus('Speaking...', 'green');
    startViz();

    const utt = new SpeechSynthesisUtterance(text);

    // Pick best female voice available
    const voices = window.speechSynthesis.getVoices();
    const female = voices.find(v =>
        v.name.includes('Google UK English Female') ||
        v.name.includes('Samantha') ||
        v.name.includes('Karen')    ||
        v.name.includes('Moira')    ||
        (v.name.toLowerCase().includes('female') && v.lang.startsWith('en')) ||
        (v.lang === 'en-GB')
    ) || voices.find(v => v.lang.startsWith('en'));

    if (female) utt.voice = female;

    // Adjust voice per mode
    const toneMap = {
        friend:     { rate: 1.05, pitch: 1.05 },
        lover:      { rate: 0.92, pitch: 1.08 },
        teacher:    { rate: 0.95, pitch: 1.0  },
        sister:     { rate: 1.08, pitch: 1.05 },
        therapist:  { rate: 0.88, pitch: 0.98 },
        motivator:  { rate: 1.12, pitch: 1.1  },
    };
    const tone = toneMap[currentMode.id] || { rate: 1.0, pitch: 1.0 };
    utt.rate   = tone.rate;
    utt.pitch  = tone.pitch;
    utt.volume = 1.0;

    utt.onend   = stopSpeaking;
    utt.onerror = stopSpeaking;

    window.speechSynthesis.speak(utt);
}

function stopSpeaking() {
    window.speechSynthesis.cancel();
    isSpeaking = false;
    orb.classList.remove('speaking');
    transcript.className = 'transcript';
    resetIdle();
}

// ════════════════════════════════════════════════════════════════
// Helpers
// ════════════════════════════════════════════════════════════════
function resetIdle(msg) {
    setStatus('Ready to listen', 'green');
    hint.textContent = 'Tap the orb to start speaking';
    if (msg) { transcript.className='transcript dim'; transcript.textContent=msg; }
    stopViz();
}

function setStatus(txt, type) {
    statusText.textContent = txt;
    statusDot.className    = 'status-dot';
    if (type === 'amber') statusDot.classList.add('amber');
    if (type === 'red')   statusDot.classList.add('red');
}

function startViz() {
    clearInterval(vizInterval);
    vizEl.classList.add('on');
    vizInterval = setInterval(() => {
        bars.forEach(b => b.style.height = (Math.random()*30+4)+'px');
    }, 85);
}

function stopViz() {
    clearInterval(vizInterval);
    vizEl.classList.remove('on');
    bars.forEach(b => b.style.height='4px');
}

// ════════════════════════════════════════════════════════════════
// Clear button
// ════════════════════════════════════════════════════════════════
document.getElementById('clearBtn').addEventListener('click', () => {
    if (recognition) recognition.abort();
    window.speechSynthesis.cancel();
    isListening = isProcessing = isSpeaking = false;
    orb.classList.remove('listening','thinking','speaking');
    transcript.className = 'transcript dim';
    transcript.textContent = 'Tap the orb to start speaking';
    hint.textContent = 'Tap the orb to start speaking';
    resetIdle();
});

// Spacebar shortcut
document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body) {
        e.preventDefault();
        orb.click();
    }
});

// Voices load async in some browsers
window.speechSynthesis.onvoiceschanged = () => {};

// Apply default mode on load
applyModeTheme(currentMode);
buildModeCards();
</script>
</body>
</html>
